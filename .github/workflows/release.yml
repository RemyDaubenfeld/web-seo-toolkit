name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            output_name: WebSEOToolkit-linux
          - os: windows-latest
            output_name: WebSEOToolkit-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dépendances Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -q -y python3-tk

      - name: Installation des dépendances Python
        run: |
          pip install pyinstaller -r requirements-build.txt
          
      - name: Build avec PyInstaller
        run: |
          pyinstaller --onefile --windowed --name ${{ matrix.output_name }} main.py

      - name: Upload de l'artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: dist/${{ matrix.output_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Téléchargement des artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Création de la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true